<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGL — Onboarding Flow Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#0f172a;-webkit-font-smoothing:antialiased}
.app{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.subtitle{color:#64748b;font-size:0.9rem;margin-bottom:32px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#e2e8f0;padding:4px;border-radius:12px;width:fit-content}
.tab{padding:10px 24px;border:none;background:transparent;font-size:0.85rem;font-weight:600;color:#64748b;cursor:pointer;border-radius:8px;transition:all 0.2s}
.tab.active{background:#fff;color:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,0.08)}

/* Flow container */
.flow{display:flex;gap:20px;align-items:flex-start}
.steps-rail{width:280px;flex-shrink:0}
.step-card{padding:14px 16px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all 0.2s;margin-bottom:8px;background:#fff}
.step-card:hover{border-color:#e2e8f0}
.step-card.active{border-color:#7c3aed;background:#faf5ff}
.step-card.done{border-color:#10b981;background:#f0fdf4}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:0.75rem;font-weight:700;color:#fff;margin-right:10px}
.step-card .step-num{background:#94a3b8}
.step-card.active .step-num{background:#7c3aed}
.step-card.done .step-num{background:#10b981}
.step-name{font-size:0.85rem;font-weight:600}
.step-desc{font-size:0.75rem;color:#94a3b8;margin-top:2px;margin-left:34px}
.step-connector{width:2px;height:12px;background:#e2e8f0;margin:0 0 0 27px}

/* Detail panel */
.detail{flex:1;background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.06);min-height:500px}
.detail h2{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.detail .tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:0.7rem;font-weight:600;margin-bottom:16px}
.tag.step-tag{background:#f3e8ff;color:#7c3aed}
.tag.action-tag{background:#fef3c7;color:#92400e}
.tag.component-tag{background:#e0f2fe;color:#0369a1}

.detail-section{margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}
.detail-section h3{font-size:0.8rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}

/* UI Preview */
.ui-preview{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-top:12px}
.ui-preview .field{margin-bottom:12px}
.ui-preview label{display:block;font-size:0.75rem;font-weight:600;color:#64748b;margin-bottom:4px}
.ui-preview input,.ui-preview select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.85rem;background:#fff}
.ui-preview .btn{padding:12px 24px;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-primary{background:#7c3aed;color:#fff}
.btn-outline{background:#fff;color:#64748b;border:1px solid #e2e8f0}

/* Style cards */
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.style-card{border:2px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;text-align:center}
.style-card:hover{border-color:#7c3aed}
.style-card.selected{border-color:#7c3aed;background:#faf5ff}
.style-mockup{height:60px;border-radius:6px;margin-bottom:8px;display:flex;align-items:flex-end;padding:8px;position:relative;overflow:hidden}
.style-mockup .mock-text{color:#fff;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;position:relative;z-index:1}
.style-mockup::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5),transparent)}
.style-name{font-size:0.8rem;font-weight:600;color:#0f172a}
.style-dots{display:flex;gap:4px;justify-content:center;margin-top:6px}
.style-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,0.1)}

/* Progress logs */
.logs{margin-top:12px}
.log{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px;font-size:0.82rem;transition:all 0.3s}
.log.done{background:#f0fdf4;color:#166534}
.log.current{background:#eff6ff;color:#1e40af}
.log.pending{background:#f8fafc;color:#94a3b8}
.log-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0}
.log.done .log-icon{background:#10b981;color:#fff}
.log.current .log-icon{background:#3b82f6;color:#fff}
.log.pending .log-icon{background:#e2e8f0;color:#94a3b8}

/* Mode cards */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.mode-card{border:2px solid #e2e8f0;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s}
.mode-card:hover{border-color:#7c3aed}
.mode-card.selected{border-color:#7c3aed;background:#faf5ff}
.mode-card .mode-name{font-size:0.85rem;font-weight:700}
.mode-card .mode-desc{font-size:0.72rem;color:#64748b;margin-top:4px}
.mode-card .mode-examples{font-size:0.68rem;color:#94a3b8;margin-top:6px;font-style:italic}

/* Sub-steps */
.sub-progress{display:flex;gap:4px;margin-bottom:16px}
.sub-bar{height:4px;border-radius:2px;flex:1;background:#e2e8f0;transition:all 0.3s}
.sub-bar.active{background:#7c3aed}
.sub-bar.done{background:#10b981}

/* Content setup */
.plan-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;margin-bottom:6px;font-size:0.82rem}
.plan-item .name{font-weight:600;color:#166534}
.plan-item .price{color:#15803d}

/* Image setup */
.upload-zone{border:2px dashed #e2e8f0;border-radius:12px;padding:24px;text-align:center;color:#94a3b8;font-size:0.82rem;margin-bottom:12px;transition:all 0.2s}
.upload-zone:hover{border-color:#7c3aed;color:#7c3aed;background:#faf5ff}

/* Data flow */
.data-flow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.data-chip{padding:4px 10px;background:#f1f5f9;border-radius:6px;font-size:0.72rem;font-weight:500;color:#475569}
.data-chip.highlight{background:#fef3c7;color:#92400e}

@media(max-width:800px){
  .flow{flex-direction:column}
  .steps-rail{width:100%}
  .style-grid{grid-template-columns:1fr 1fr}
  .mode-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
<h1>PGL — Onboarding Flow</h1>
<p class="subtitle">Playground interativo do fluxo de cadastro</p>

<div class="tabs">
  <button class="tab active" onclick="switchPath('google')">Google Places</button>
  <button class="tab" onclick="switchPath('manual')">Cadastro Manual</button>
</div>

<div class="flow">
  <!-- Steps Rail -->
  <div class="steps-rail" id="steps-rail"></div>
  <!-- Detail Panel -->
  <div class="detail" id="detail-panel"></div>

let currentPath = 'google';
let activeStep = null;

function switchPath(path) {
  currentPath = path;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  activeStep = null;
  renderSteps();
  renderDetail(currentPath === 'google' ? 'choose' : 'mode');
}

function renderSteps() {
  const steps = currentPath === 'google' ? GOOGLE_STEPS : MANUAL_STEPS;
  const rail = document.getElementById('steps-rail');
  rail.innerHTML = steps.map((s, i) => `
    <div class="step-card ${activeStep === s.id ? 'active' : ''}" onclick="selectStep('${s.id}')">
      <span class="step-num">${i + 1}</span>
      <span class="step-name">${s.name}</span>
      <div class="step-desc">${s.desc}</div>
    </div>
    ${i < steps.length - 1 ? '<div class="step-connector"></div>' : ''}
  `).join('');
}

function selectStep(id) {
  activeStep = id;
  renderSteps();
  renderDetail(id);
}

function renderDetail(id) {
  const detail = DETAILS[id];
  if (!detail) return;
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `<h2>${detail.title}</h2>${detail.content}`;
}

// Init
renderSteps();
renderDetail('choose');
</script>
